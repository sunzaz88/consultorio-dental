    <form id="miformulario">

        <label for="nombres">Nombres</label><br>
        <input type="text" id="nombres" name="nombres" required> <br>

        <label for="apellidos">Apellidos</label><br>
        <input type="text" id="apellidos" name="apellidos" required> <br>

        <label for="edad">Edad</label><br>
        <input type="age" id="edad" name="edad" required> <br>

        <label for="genero">Genero</label><br>
        <input type="gender" id="genero" name="genero" required> <br>

        <label for="telefono">Tel&eacute;fono</label><br>
        <input type="tel" id="telefono" name="telefono" required> <br>

        <label for="correo">Correo Electr&oacute;nico</label><br>
        <input type="email" id="correo" name="correo" required> <br>

        <button type="submit"> Enviar</button>
    </form>
    <p class="mensaje" id="mensaje"></p>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzBN2BzLF3iXtTeZKHmCrGGHB5ohZol4EZo5w7K1OOZKafiJuu6wDpEr6FmpiBEGOYw/exec"

        document.getElementById("miformulario")
        .addEventListener ("submit", function (e){

            e.preventDefault();

            const datos = {
                apellidos: document.getElementById("apellidos").value,
                nombres: document.getElementById("nombres").value,
                telefono: document.getElementById("telefono").value,
                correo: document.getElementById("correo").value,
                edad: document.getElementById("edad").value,
                genero: document.getElementById("genero").value,

            };

            fetch(url, {
                method: "POST",
                body: JSON.stringify(datos)
            })

            .then(res => res.json())
            .then(data => {
            document.getElementById("mensaje").innerHTML = 
                "Datos guardados correctamente ✔";
            document.getElementById("miFormulario").reset();
            })
            .catch(error => {
            document.getElementById("mensaje").innerHTML = 
                "Error al guardar ❌";
                
            });

        });
    </script>
